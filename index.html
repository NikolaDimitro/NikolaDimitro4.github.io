<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>My Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
}

button {
    padding: 10px;
    border-radius: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>☁️ My Cloud</h1>

    <input type="file" id="fileInput">
    <br><br>
    <button onclick="uploadFile()">Качи</button>

    <h3>Файлове:</h3>
    <div id="links"></div>
</div>

<script>
const supabaseUrl = "https://jniiizemwddovvufyxth.supabase.co";
const supabaseKey = "sb_publishable_0Sk-PSSLViPEqkpjwEdCUQ_rqIg4Clz";

/* ✅ ПРОМЯНА 1 */
const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return;

    /* ✅ ПРОМЯНА 2 */
    const fileName = Date.now() + "_" + file.name;

    const { data, error } = await supabaseClient.storage
        .from('files')
        .upload(fileName, file);

    if (error) {
        alert("Грешка: " + error.message);
        console.error(error);
        return;
    }

    const { data: urlData } = supabaseClient.storage
        .from('files')
        .getPublicUrl(fileName);

    const div = document.createElement("div");
    div.innerHTML = `<a href="${urlData.publicUrl}" target="_blank">${file.name}</a>`;
    document.getElementById("links").appendChild(div);
}
</script>

</body>
</html>
