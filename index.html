<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>My Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
}

button {
    padding: 10px;
    border-radius: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}

.file {
    background: #334155;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>☁️ My Cloud</h1>

    <input type="file" id="fileInput">
    <br><br>
    <button onclick="uploadFile()">Качи</button>

    <h3>Файлове:</h3>
    <div id="links"></div>
</div>

<script>
const supabaseUrl = "https://jniiizemwddovvufyxth.supabase.co";
const supabaseKey = "sb_publishable_0Sk-PSSLViPEqkpjwEdCUQ_rqIg4Clz";

const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

// Upload
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return;

    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabaseClient.storage
        .from('files')
        .upload(fileName, file);

    if (error) {
        alert("Грешка: " + error.message);
        return;
    }

    loadFiles();
}

// Load files
async function loadFiles() {
    const { data, error } = await supabaseClient.storage
        .from('files')
        .list('', { limit: 100 });

    if (error) {
        console.error(error);
        return;
    }

    const container = document.getElementById("links");
    container.innerHTML = "";

    data.forEach(file => {
        const { data: urlData } = supabaseClient.storage
            .from('files')
            .getPublicUrl(file.name);

        const url = urlData.publicUrl;

        let preview = "";
        if (file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
            preview = `<br><img src="${url}" style="max-width:100%">`;
        }

        const div = document.createElement("div");
        div.innerHTML = `
            <b>${file.name}</b><br>
            <a href="${url}" target="_blank">🔗 Отвори</a>
            <a href="${url}" download>⬇️ Изтегли</a>
            <button onclick="deleteFile('${file.name}')">🗑️ Изтрий</button>
            ${preview}
        `;

        container.appendChild(div);
    });
}

// Delete
async function deleteFile(fileName) {
    if (!confirm("Сигурен ли си?")) return;

    const { error } = await supabaseClient.storage
        .from('files')
        .remove([fileName]);

    if (error) {
        alert("Грешка: " + error.message);
        return;
    }

    loadFiles();
}

loadFiles();
</script>
    
</body>
</html>
