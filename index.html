<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>My Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

button {
    padding: 10px;
    border-radius: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
    margin: 5px;
}

.file {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px;
    margin: 10px;
}

.phone .container { max-width: 300px; font-size: 14px; }
.tablet .container { max-width: 600px; font-size: 16px; }
.pc .container { max-width: 900px; font-size: 18px; }
</style>
</head>

<body>

<!-- Device -->
<div id="deviceSelector" style="position:fixed; width:100%; height:100%; background:#0f172a; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999;">
    <h2>Избери устройство</h2>
    <button onclick="setDevice('phone')">📱 Телефон</button>
    <button onclick="setDevice('tablet')">📟 Таблет</button>
    <button onclick="setDevice('pc')">💻 Компютър</button>
</div>

<!-- Login -->
<div id="loginScreen">
    <h2>Вход</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signUp()">Регистрация</button>
    <button onclick="signIn()">Вход</button>
</div>

<div class="container">
    <h1>☁️ My Cloud</h1>

    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Качи</button>

    <!-- Drag -->
    <div id="dropZone" style="border:2px dashed #38bdf8; padding:20px; margin-top:20px;">
        Пусни файл тук 📂
    </div>

    <!-- Search -->
    <input id="searchInput" placeholder="🔍 Търси..." style="margin-top:15px; padding:10px; border-radius:10px; width:80%;">

    <h3>Файлове:</h3>
    <div id="links"></div>
</div>

<script>
const supabaseUrl = "https://jniiizemwddovvufyxth.supabase.co";
const supabaseKey = "sb_publishable_0Sk-PSSLViPEqkpjwEdCUQ_rqIg4Clz";

const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

let currentUser = "";

// ================= LOGIN (ИСТИНСКИ) =================

async function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signUp({ email, password });
    if (error) return alert(error.message);

    alert("Регистриран успешно!");
}

async function signIn() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email, password
    });

    if (error) return alert(error.message);

    currentUser = data.user.id;
    document.getElementById("loginScreen").style.display = "none";

    loadFiles();
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}

// AUTO LOGIN
(async () => {
    const { data } = await supabaseClient.auth.getSession();
    if (data.session) {
        currentUser = data.session.user.id;
        document.getElementById("loginScreen").style.display = "none";
        loadFiles();
    }
})();

// ================= UPLOAD =================

async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return;

    const fileName = Date.now() + "_" + file.name;

    await supabaseClient.storage
        .from('files')
        .upload(currentUser + "/" + fileName, file);

    loadFiles();
}

// ================= LOAD FILES =================

async function loadFiles() {
    if (!currentUser) return;

    const { data } = await supabaseClient.storage
        .from('files')
        .list(currentUser);

    const search = document.getElementById("searchInput").value.toLowerCase();

    const container = document.getElementById("links");
    container.innerHTML = "";

    data
    .filter(file => file.name.toLowerCase().includes(search))
    .forEach(file => {

        const { data: urlData } = supabaseClient.storage
            .from('files')
            .getPublicUrl(currentUser + "/" + file.name);

        const url = urlData.publicUrl;

        const div = document.createElement("div");
        div.className = "file";

        div.innerHTML = `
            <b>${file.name}</b><br>
            <a href="${url}" target="_blank">🔗 Отвори</a>
            <button onclick="downloadFile('${url}', '${file.name}')">⬇️ Изтегли</button>
            <button onclick="shareFile('${file.name}')">🔗 Сподели</button>
            <button onclick="deleteFile('${file.name}')">🗑️ Изтрий</button>
        `;

        container.appendChild(div);
    });
}

// ================= SHARE =================

function shareFile(fileName) {
    const { data } = supabaseClient.storage
        .from('files')
        .getPublicUrl(currentUser + "/" + fileName);

    navigator.clipboard.writeText(data.publicUrl);
    alert("Линкът е копиран!");
}

// ================= DELETE =================

async function deleteFile(fileName) {
    await supabaseClient.storage
        .from('files')
        .remove([currentUser + "/" + fileName]);

    loadFiles();
}

// ================= DOWNLOAD =================

async function downloadFile(url, fileName) {
    const response = await fetch(url);
    const blob = await response.blob();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    a.click();
}

// ================= SEARCH =================

document.getElementById("searchInput").addEventListener("input", loadFiles);

// ================= DRAG DROP =================

const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
});

dropZone.addEventListener("drop", async e => {
    e.preventDefault();

    const file = e.dataTransfer.files[0];
    if (!file) return;

    const fileName = Date.now() + "_" + file.name;

    await supabaseClient.storage
        .from('files')
        .upload(currentUser + "/" + fileName, file);

    loadFiles();
});
</script>

</body>
</html>
