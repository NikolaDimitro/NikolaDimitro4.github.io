<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>My Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

button {
    padding: 10px;
    border-radius: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
    margin: 5px;
}

.file {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px;
    margin: 10px;
}

.phone .container { max-width: 300px; font-size: 14px; }
.tablet .container { max-width: 600px; font-size: 16px; }
.pc .container { max-width: 900px; font-size: 18px; }
</style>
</head>

<body>

<!-- Device -->
<div id="deviceSelector" style="position:fixed; width:100%; height:100%; background:#0f172a; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999;">
    <h2>Избери устройство</h2>
    <button onclick="setDevice('phone')">📱 Телефон</button>
    <button onclick="setDevice('tablet')">📟 Таблет</button>
    <button onclick="setDevice('pc')">💻 Компютър</button>
</div>

<!-- Login -->
<div id="loginScreen" style="position:fixed; width:100%; height:100%; background:#0f172a; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999;">
    <h2>Вход</h2>
    <input id="username" placeholder="Име">
    <button onclick="login()">Влез</button>
</div>

<div class="container">
    <h1>☁️ My Cloud</h1>

    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Качи</button>

    <!-- Drag -->
    <div id="dropZone" style="border:2px dashed #38bdf8; padding:20px; margin-top:20px;">
        Пусни файл тук 📂
    </div>

    <!-- Search -->
    <input id="searchInput" placeholder="🔍 Търси..." style="margin-top:15px; padding:10px; border-radius:10px; width:80%;">

    <h3>Файлове:</h3>
    <div id="links"></div>
</div>

<script>
const supabaseUrl = "https://jniiizemwddovvufyxth.supabase.co";
const supabaseKey = "sb_publishable_0Sk-PSSLViPEqkpjwEdCUQ_rqIg4Clz";

let currentUser = "";

const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseKey);

// LOGIN
function login() {
    const name = document.getElementById("username").value.trim();
    if (!name) return alert("Въведи име");

    currentUser = name;
    localStorage.setItem("user", name);

    document.getElementById("loginScreen").style.display = "none";
    loadFiles();
}

// user
const savedUser = localStorage.getItem("user");
if (savedUser) {
    currentUser = savedUser;
    document.getElementById("loginScreen").style.display = "none";
}

// Upload
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return;

    const fileName = Date.now() + "_" + file.name;

    await supabaseClient.storage
        .from('files')
        .upload(currentUser + "/" + fileName, file);

    loadFiles();
}

// Load
async function loadFiles() {
    if (!currentUser) return;

    const { data } = await supabaseClient.storage
        .from('files')
        .list(currentUser);

    const search = document.getElementById("searchInput").value.toLowerCase();

    const container = document.getElementById("links");
    container.innerHTML = "";

    data
    .filter(file => file.name.toLowerCase().includes(search))
    .forEach(file => {

        // LOCK
        const locked = localStorage.getItem("lock_" + file.name);
        if (locked) {
            const pass = prompt("Файлът е заключен:");
            if (pass !== locked) return;
        }

        const { data: urlData } = supabaseClient.storage
            .from('files')
            .getPublicUrl(currentUser + "/" + file.name);

        const url = urlData.publicUrl;

        const div = document.createElement("div");
        div.className = "file";

        div.innerHTML = `
            <b>${file.name}</b><br>
            <a href="${url}" target="_blank">🔗 Отвори</a>
            <button onclick="downloadFile('${url}', '${file.name}')">⬇️ Изтегли</button>
            <button onclick="lockFile('${file.name}')">🔐 Заключи</button>
            <button onclick="deleteFile('${file.name}')">🗑️ Изтрий</button>
        `;

        container.appendChild(div);
    });
}

// LOCK
function lockFile(fileName) {
    const pass = prompt("Парола:");
    if (!pass) return;
    localStorage.setItem("lock_" + fileName, pass);
}

// Delete
async function deleteFile(fileName) {
    await supabaseClient.storage
        .from('files')
        .remove([currentUser + "/" + fileName]);

    loadFiles();
}

// Download
async function downloadFile(url, fileName) {
    const response = await fetch(url);
    const blob = await response.blob();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    a.click();
}

// Device
function setDevice(type) {
    document.body.classList.add(type);
    document.getElementById("deviceSelector").style.display = "none";
    localStorage.setItem("device", type);
}

const savedDevice = localStorage.getItem("device");
if (savedDevice) setDevice(savedDevice);

// Drag
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.style.background = "#1e293b";
});

dropZone.addEventListener("dragleave", () => {
    dropZone.style.background = "transparent";
});

dropZone.addEventListener("drop", async e => {
    e.preventDefault();
    dropZone.style.background = "transparent";

    const file = e.dataTransfer.files[0];
    if (!file) return;

    const fileName = Date.now() + "_" + file.name;

    await supabaseClient.storage
        .from('files')
        .upload(currentUser + "/" + fileName, file);

    loadFiles();
});

// search live
document.getElementById("searchInput").addEventListener("input", loadFiles);

loadFiles();
</script>

</body>
</html>
